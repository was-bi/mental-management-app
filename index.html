<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>希死念慮 記録アプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 10px; background: #fefefe; }
    .timeline { width: 95vw; max-width:600px; height: 22px; border-radius: 12px; background: #eee; position: relative; margin: 4px 0 12px 0;}
    .bar { height: 22px; position: absolute; border-radius: 12px; background: #e44040; transition: width 0.3s; }
    .date-row {display: flex; align-items: center; margin-bottom: 6px;}
    .date-label { width: 95px; color: #333; font-size:13px;}
    button, select { margin: 4px; font-size:15px;}
    .small {font-size:10px;}
    .del-btn { color: #e34949; background: none; border:none;}
    .add-manual {font-size:13px;}
    .pdf-btn {margin-top:12px; font-size:16px;}
    .recording { background: #fff2e2; border:1.5px dashed #e58915; margin:7px 0; padding:8px 4px; border-radius:8px;}
  </style>
</head>
<body>
<div id="app">
  <h2>希死念慮 記録アプリ</h2>

  <!-- 一覧 -->
  <div v-for="(entry, i) in log" :key="entry.date" class="date-row">
    <span class="date-label">{{ entry.date }}</span>
    <div class="timeline">
      <div v-for="(r, j) in entry.ranges" :style="barStyle(r.start, r.end)" class="bar"></div>
    </div>
    <button class="del-btn" @click="removeDate(i)">削除</button>
  </div>

  <!-- 録画中パネル -->
  <div v-if="isRecording" class="recording">
    <b>今記録中（希死念慮 継続中）:</b>
    <span> {{recordingStart}} 〜 ...</span>
    <button @click="stopRecord">収まった（終了）</button>
  </div>
  <div v-else>
    <button @click="startRecord">希死念慮が始まった</button>
  </div>
  <button @click="saveToPdf" class="pdf-btn">PDF書き出し</button>

  <!-- 手動追加 -->
  <details class="add-manual">
    <summary>手動で追加・修正</summary>
    <label>日付: <input type="date" v-model="manual.date"></label><br>
    <label>開始: <input type="time" v-model="manual.start"></label>
    <label>終了: <input type="time" v-model="manual.end"></label>
    <button @click="addManual">追加</button>
  </details>
</div>

<script>
new Vue({
  el: '#app',
  data: {
    log: [],
    manual: {date: '', start: '', end: ''},
    isRecording: false,
    recordingStart: null,
    recordingDate: null,
  },
  created() {
    // 復元
    const data = localStorage.getItem('suicidal_log_v1');
    if(data) this.log = JSON.parse(data);

    // 記録中状態も復元
    const s = localStorage.getItem('suicidal_rec_start');
    const d = localStorage.getItem('suicidal_rec_date');
    if(s && d){
      this.isRecording = true; this.recordingStart = s; this.recordingDate = d;
    }
  },
  watch: {
    log: {
      handler(val) { localStorage.setItem('suicidal_log_v1', JSON.stringify(val)); }, deep:true
    },
    isRecording: function(val){
      if(val){
        localStorage.setItem('suicidal_rec_start', this.recordingStart);
        localStorage.setItem('suicidal_rec_date', this.recordingDate);
      }else{
        localStorage.removeItem('suicidal_rec_start');
        localStorage.removeItem('suicidal_rec_date');
      }
    }
  },
  methods: {
    today() { return new Date().toISOString().slice(0,10); },
    nowTime() { return new Date().toTimeString().slice(0,5); },
    timeNum(str){if(!str)return 0;const [h,m]=str.split(':').map(Number);return h*60+m;},
    barStyle(s, e) {
      const left = (this.timeNum(s)/1440*100).toFixed(1)+'%';
      const width = ((this.timeNum(e)-this.timeNum(s))/1440*100).toFixed(1)+'%';
      return {left, width, background:'#e44040'};
    },
    findDate(d){ return this.log.find(e=>e.date===d); },
    startRecord(){
      this.isRecording = true;
      this.recordingStart = this.nowTime();
      this.recordingDate = this.today();
    },
    stopRecord(){
      const now = this.nowTime();
      const d = this.recordingDate||this.today();
      let ent = this.log.find(e=>e.date===d);
      if(!ent){ent={date:d, ranges:[]}; this.log.unshift(ent);}
      ent.ranges.push({start:this.recordingStart, end:now});
      this.isRecording = false;
      this.recordingStart = null;
      this.recordingDate = null;
    },
    addManual() {
      const {date, start, end} = this.manual;
      if(!date||!start||!end)return alert('全部入れて！');
      let ent = this.findDate(date);
      if(!ent){ent={date, ranges:[]}; this.log.unshift(ent);}
      ent.ranges.push({start, end});
      this.manual = {date:'', start:'', end:''};
    },
    removeDate(i){
      if(confirm('本当に消しますか？'))this.log.splice(i,1);
    },
    saveToPdf(){
      const doc = new window.jspdf.jsPDF();
      doc.text("希死念慮 記録ログ", 10, 10);
      let y = 20;
      this.log.forEach(entry=>{
        doc.text(`${entry.date}`, 10, y);
        y+=6;
        entry.ranges.forEach(r=>{
          doc.text(`  ${r.start} - ${r.end}`, 10, y);
          y+=6;
        });
        y+=3;
        if(y>270){doc.addPage();y=10;}
      });
      doc.save("log.pdf");
    }
  }
});
</script>
</body>
</html>
