<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>希死念慮 記録アプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 20px; background: #f9f9f9; color: #333; }
    h2 { font-size: 1.2rem; border-left: 5px solid #e44040; padding-left: 10px; }
    
    /* ガントチャートの外枠 */
    .chart-container { position: relative; margin-bottom: 20px; background: #fff; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .date-label { font-weight: bold; font-size: 14px; margin-bottom: 8px; display: block; }
    
    /* 24時間の背景目盛り */
    .timeline-wrapper { position: relative; height: 40px; background: #eee; border-radius: 4px; overflow: hidden; border: 1px solid #ddd; }
    .hour-grid { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(0,0,0,0.1); }
    .hour-text { position: absolute; top: 42px; font-size: 9px; color: #888; transform: translateX(-50%); }

    /* 記録されたバー */
    .bar { height: 100%; position: absolute; background: #e44040; opacity: 0.8; z-index: 2; border-radius: 2px; }

    .controls { margin-top: 30px; display: flex; gap: 10px; flex-wrap: wrap; }
    button { padding: 10px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
    .btn-record { background: #e44040; color: white; }
    .btn-stop { background: #333; color: white; }
    .btn-pdf { background: #555; color: white; }
    .btn-del { background: none; color: #999; font-size: 12px; text-decoration: underline; margin-top: 5px; }

    .recording-status { background: #fff2e2; border: 1px solid #e58915; padding: 15px; border-radius: 8px; margin: 15px 0; }
    details { margin-top: 20px; font-size: 13px; color: #666; }
  </style>
</head>
<body>
<div id="app">
  <h2>希死念慮 記録ログ</h2>

  <div v-for="(entry, i) in log" :key="entry.date" class="chart-container">
    <span class="date-label">{{ entry.date }}</span>
    <div class="timeline-wrapper">
      <div v-for="h in 25" :key="h" class="hour-grid" :style="{ left: ((h-1)/24*100) + '%' }"></div>
      <div v-for="(r, j) in entry.ranges" :style="barStyle(r.start, r.end)" class="bar"></div>
    </div>
    <div style="position: relative; height: 20px; margin-bottom: 10px;">
      <span v-for="h in [0,3,6,9,12,15,18,21,24]" :key="h" class="hour-text" :style="{ left: (h/24*100) + '%' }">{{h}}</span>
    </div>
    <button class="btn-del" @click="removeDate(i)">この日のデータを削除</button>
  </div>

  <div class="controls">
    <div v-if="isRecording" class="recording-status">
      <strong>現在記録中...</strong><br>
      開始時刻: {{recordingStart}}<br>
      <button class="btn-stop" @click="stopRecord" style="margin-top:10px;">収まった（終了）</button>
    </div>
    <button v-else class="btn-record" @click="startRecord">希死念慮が始まった</button>
    <button @click="saveToPdf" class="btn-pdf">PDFで保存する</button>
  </div>

  <details>
    <summary>手動で時間を追加する</summary>
    日付: <input type="date" v-model="manual.date"><br>
    開始: <input type="time" v-model="manual.start"> 
    終了: <input type="time" v-model="manual.end">
    <button @click="addManual">追加</button>
  </details>
</div>

<script>
new Vue({
  el: '#app',
  data: {
    log: [],
    manual: {date: '', start: '', end: ''},
    isRecording: false,
    recordingStart: null,
    recordingDate: null,
  },
  created() {
    const data = localStorage.getItem('suicidal_log_v2');
    if(data) this.log = JSON.parse(data);
    const s = localStorage.getItem('suicidal_rec_start');
    const d = localStorage.getItem('suicidal_rec_date');
    if(s && d){ this.isRecording = true; this.recordingStart = s; this.recordingDate = d; }
  },
  watch: {
    log: { handler(val) { localStorage.setItem('suicidal_log_v2', JSON.stringify(val)); }, deep:true },
    isRecording(val){
      if(val){ localStorage.setItem('suicidal_rec_start', this.recordingStart); localStorage.setItem('suicidal_rec_date', this.recordingDate);
      }else{ localStorage.removeItem('suicidal_rec_start'); localStorage.removeItem('suicidal_rec_date'); }
    }
  },
  methods: {
    today() { return new Date().toLocaleString('sv-SE').slice(0,10); },
    nowTime() { return new Date().toTimeString().slice(0,5); },
    timeNum(str){ const [h,m]=str.split(':').map(Number); return h*60+m; },
    barStyle(s, e) {
      const left = (this.timeNum(s)/1440*100).toFixed(2)+'%';
      const width = ((this.timeNum(e)-this.timeNum(s))/1440*100).toFixed(2)+'%';
      return { left, width };
    },
    startRecord(){
      this.isRecording = true;
      this.recordingStart = this.nowTime();
      this.recordingDate = this.today();
    },
    stopRecord(){
      const now = this.nowTime();
      const d = this.recordingDate || this.today();
      let ent = this.log.find(e=>e.date===d);
      if(!ent){ ent={date:d, ranges:[]}; this.log.unshift(ent); }
      ent.ranges.push({start:this.recordingStart, end:now});
      this.log.sort((a,b) => b.date.localeCompare(a.date));
      this.isRecording = false;
    },
    addManual() {
      const {date, start, end} = this.manual;
      if(!date||!start||!end) return alert('入力してください');
      let ent = this.log.find(e=>e.date===date);
      if(!ent){ ent={date, ranges:[]}; this.log.unshift(ent); }
      ent.ranges.push({start, end});
      this.log.sort((a,b) => b.date.localeCompare(a.date));
      this.manual = {date:'', start:'', end:''};
    },
    removeDate(i){ if(confirm('削除しますか？')) this.log.splice(i,1); },
    saveToPdf(){
      const doc = new window.jspdf.jsPDF();
      doc.text("希死念慮 記録ログ", 10, 10);
      let y = 20;
      this.log.forEach(entry=>{
        doc.text(entry.date, 10, y); y+=8;
        entry.ranges.forEach(r=>{ doc.text(`  ${r.start} - ${r.end}`, 15, y); y+=6; });
        y+=4; if(y>270){doc.addPage();y=10;}
      });
      doc.save("log.pdf");
    }
  }
});
</script>
</body>
</html>
